name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: presentation/2026-04-22T1047-v1-github-copilot-foundations-to-agents
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: presentation/2026-04-22T1047-v1-github-copilot-foundations-to-agents/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        env:
          VITE_BASE: /20260422-github-copilot-intro/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation/2026-04-22T1047-v1-github-copilot-foundations-to-agents/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
